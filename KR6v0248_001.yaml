body:
  text: 碑陰邑師法仙門師僧欽門師靜大魏大統四年歲在戊午十二月丙戊朔辛亥日佛弟子合邑卌人等生閻浮運遭末劫自飛高因妙業無以同生彼岸遂爾謫相率化頃竭己資仰為皇帝國主建崇四面天宮石像一區逮及師僧父母七世所生因緣眷屬香火邑義生世值佛聞法彌勒現世願登先首邊地衆生普同正覺咸登正果那侯桃枝那魯法容蔡典録魯阿回王晏主侯真姜郭阿主董雙臺魯神妃像主蔡阿早魯阿妃像主李思好魯早妃王敬容買姜袁次男貴侯樂善王定貴女張敬姜敬女晹賜王魯要容張僧賣魯洛姿董洛媚侯憎乃魯舍貴陳賤貴董先敬魯義勝楊令姿張定姜任始貴魯阿令魯妙姿小姿
